<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        var isValida = window.location.hostname.includes('validamabuku');
        window.APP_CONFIG = { isValida: isValida };
        
        var favHref = isValida ? '/validamabuku-favicon.png' : '/kutarafavicon.png';
        var appTitle = isValida ? 'Valida Mabuku' : 'Kutara Mabuku';
        
        var link = document.createElement('link');
        link.rel = 'icon';
        link.type = 'image/png';
        link.href = favHref;
        document.head.appendChild(link);
        
        document.title = appTitle;
      })();
    </script>
    <meta name="description" content="Create stunning standard, interactive, and professional ebooks with Kutara Mabuku. Easy-to-use templates and powerful creation tools.">
    <meta name="author" content="Kutara Mabuku" />

    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kutaramabuku" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta property="og:title" content="Kutara Mabuku - Create Beautiful Ebooks">
  <meta name="twitter:title" content="Kutara Mabuku - Create Beautiful Ebooks">
  <meta property="og:description" content="Create stunning standard, interactive, and professional ebooks with Kutara Mabuku. Easy-to-use templates and powerful creation tools.">
  <meta name="twitter:description" content="Create stunning standard, interactive, and professional ebooks with Kutara Mabuku. Easy-to-use templates and powerful creation tools.">
</head>

  <body>
    <div id="splash-screen" style="position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s ease-out;">
      <img id="splash-logo" src="" alt="Loading" style="width: 150px; height: auto; margin-bottom: 24px; object-fit: contain;" />
      <h1 id="splash-title" style="font-size: 24px; font-weight: 700; margin-bottom: 40px; background: linear-gradient(135deg, #70CBD4, #69A1EB); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"></h1>
      <script>
        var logoImg = document.getElementById('splash-logo');
        var titleElem = document.getElementById('splash-title');
        if (logoImg) logoImg.src = window.APP_CONFIG && window.APP_CONFIG.isValida ? '/validamabuku-logo.png' : '/kutarafavicon.png';
        if (titleElem) titleElem.textContent = window.APP_CONFIG && window.APP_CONFIG.isValida ? 'Valida Mabuku' : 'Kutara Mabuku';
      </script>
      <div style="display: flex; gap: 12px;">
        <div style="width: 12px; height: 12px; border-radius: 50%; background: #70CBD4; animation: bounce 1.4s infinite ease-in-out both; animation-delay: -0.32s;"></div>
        <div style="width: 12px; height: 12px; border-radius: 50%; background: #69A1EB; animation: bounce 1.4s infinite ease-in-out both; animation-delay: -0.16s;"></div>
        <div style="width: 12px; height: 12px; border-radius: 50%; background: #70CBD4; animation: bounce 1.4s infinite ease-in-out both;"></div>
      </div>
    </div>
    <style>
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 300);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
